---
layout: default
---

<article class="shell section-shell quick-wits-page" data-quick-wits-page>
  <header class="quick-wits-hero">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="quick-wits-description">{{ page.description }}</p>
    <div class="quick-takes-meta">
      <span>Last updated: {{ site.time | date: "%B %d, %Y" }}</span>
      <span aria-hidden="true">·</span>
      <a href="https://twitter.com/batra99" target="_blank" rel="noopener">@batra99</a>
    </div>
  </header>

  <div class="quick-takes-content">
    <div class="takes-list organized-takes prose" data-qw-feed>
      {{ content }}
    </div>
  </div>

  <footer class="quick-takes-footer">
    <p>Have thoughts? <a href="https://twitter.com/batra99" target="_blank" rel="noopener">Tweet at me</a>.</p>
  </footer>
</article>

<script src="{{ '/assets/js/quick-wits.js' | relative_url }}" defer></script>
