---
layout: default
---

<article class="shell section-shell generic-page">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.description %}
      <p class="section-description">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>
