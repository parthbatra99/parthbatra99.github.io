{% if page.narration %}
<div class="post-audio" role="region" aria-label="Listen to this post">
  <button class="post-audio-play" id="post-audio-play" aria-label="Play narration" aria-pressed="false">
    <svg class="post-audio-icon post-audio-icon--play" viewBox="0 0 16 16" width="14" height="14" aria-hidden="true" fill="currentColor">
      <path d="M3 2.268a.75.75 0 0 1 1.145-.638l10 5.732a.75.75 0 0 1 0 1.276l-10 5.732A.75.75 0 0 1 3 13.732V2.268z"/>
    </svg>
    <svg class="post-audio-icon post-audio-icon--pause" viewBox="0 0 16 16" width="14" height="14" aria-hidden="true" fill="currentColor">
      <rect x="3" y="2" width="4" height="12" rx="1.25"/>
      <rect x="9" y="2" width="4" height="12" rx="1.25"/>
    </svg>
  </button>

  <div class="post-audio-body">
    <div class="post-audio-label-row">
      <span class="post-audio-label">Listen</span>
      <span class="post-audio-times">
        <span id="post-audio-current">0:00</span><span class="post-audio-sep" aria-hidden="true"> / </span><span id="post-audio-duration">--:--</span>
      </span>
    </div>
    <div class="post-audio-track" id="post-audio-track"
         role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
      <div class="post-audio-fill" id="post-audio-fill"></div>
      <div class="post-audio-thumb" id="post-audio-thumb"></div>
    </div>
  </div>

  <button class="post-audio-speed" id="post-audio-speed" aria-label="Playback speed">1×</button>

  <audio id="post-audio-el" src="{{ page.narration_src }}" preload="metadata"></audio>
</div>
{% endif %}
