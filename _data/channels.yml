# Blog "channels" — browse-by-what-I-did shelves on /blog.
# Order here = display order. One axis: the action behind the post.
# Each channel maps to one or more post `kind:` values via `kinds:`.
- name: I Built It
  icon: "⚡"
  blurb: Things I made, start to finish.
  kinds: [built]
- name: I Dug Into It
  icon: "🔍"
  blurb: Curiosities chased and experiments run on myself.
  kinds: [rabbit-hole, experiment]
- name: I Worked It Out
  icon: "🧠"
  blurb: Frameworks I built and the ideas books handed me.
  kinds: [theory, from-a-book]
- name: I Lived It
  icon: "🌄"
  blurb: Notes from the road.
  kinds: [field-notes]
